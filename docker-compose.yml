version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: redis-server
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: wifian
      POSTGRES_PASSWORD: wifian123
      POSTGRES_DB: wifianID

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: monitoring-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      # Database URL pointing to the postgres service
      - DATABASE_URL=postgresql://wifian:wifian123@postgres-db:5432/wifianID?schema=public
      - REDIS_URL=redis://redis-server:6379
      - JWT_SECRET=wifian_secret_key_123 # Ganti dengan secret Anda
      - PORT=5000
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: monitoring-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  redis_data:
  postgres_data: