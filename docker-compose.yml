version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: redis-server
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: wifian
      POSTGRES_PASSWORD: wifian123
      POSTGRES_DB: wifianID

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data: